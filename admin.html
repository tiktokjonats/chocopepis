<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHOCOPEPIS - Panel Administrativo Silvia</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-active { border-bottom: 4px solid #78350f; color: #78350f; font-weight: bold; }
    </style>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-8 bg-white p-6 rounded-xl shadow-sm">
            <h1 class="text-2xl font-black text-amber-900 uppercase tracking-tighter">CHOCOPEPIS ADMIN</h1>
            <button onclick="logout()" class="text-red-600 font-bold hover:bg-red-50 px-4 py-2 rounded-lg transition">Cerrar Sesión</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-4 space-y-6">
                <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-green-600">
                    <h2 id="form-title" class="font-bold mb-4 text-amber-800 text-lg">Subir Nuevo Producto</h2>
                    <input type="hidden" id="edit-id">
                    <div class="space-y-3">
                        <input type="text" id="p-nombre" placeholder="Nombre Chocoteja" class="w-full p-2 border rounded outline-none focus:border-green-500 text-sm">
                        <input type="number" step="0.1" id="p-precio" placeholder="Precio S/." class="w-full p-2 border rounded outline-none focus:border-green-500 text-sm">
                        <textarea id="p-desc" placeholder="Descripción" class="w-full p-2 border rounded h-20 outline-none focus:border-green-500 text-sm"></textarea>
                        
                        <label class="block text-xs font-bold text-gray-500 uppercase">Foto o Video:</label>
                        <input type="file" id="p-archivo" accept="image/*,video/*" class="w-full text-xs text-gray-500">
                        
                        <div id="loading" class="hidden text-xs text-orange-600 animate-pulse font-bold text-center">Procesando...</div>
                        
                        <div class="flex gap-2">
                            <button onclick="guardarProducto()" id="btn-subir" class="flex-1 bg-green-600 text-white font-bold py-2 rounded hover:bg-green-700 transition">PUBLICAR</button>
                            <button onclick="cancelarEdicion()" id="btn-cancelar" class="hidden flex-1 bg-gray-400 text-white font-bold py-2 rounded">CANCELAR</button>
                        </div>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-amber-500 text-sm">
                    <h2 class="font-bold mb-2 text-amber-800 uppercase">Mi Pago (Yape/Plin)</h2>
                    <input type="text" id="yape-nombre" placeholder="Nombre Silvia Pazos" class="w-full p-2 border rounded mb-2">
                    <div id="qr-preview" class="flex justify-center mb-2 bg-gray-50 p-2 rounded border border-dashed border-gray-300 min-h-[100px] items-center"></div>
                    <input type="file" id="qr-archivo" accept="image/*" class="w-full text-xs mb-3">
                    <button onclick="actualizarConfiguracion()" class="w-full bg-amber-600 text-white font-bold py-2 rounded hover:bg-amber-700 transition">ACTUALIZAR QR</button>
                </div>
            </div>

            <div class="lg:col-span-8 space-y-6">
                <div class="bg-white rounded-xl shadow-md overflow-hidden border-t-4 border-amber-900">
                    <div class="flex border-b">
                        <button onclick="cambiarTabPedidos('Pendiente')" id="tab-pendientes" class="flex-1 py-3 tab-active text-xs">PEDIDOS PENDIENTES</button>
                        <button onclick="cambiarTabPedidos('Finalizado')" id="tab-historial" class="flex-1 py-3 text-gray-500 text-xs">HISTORIAL</button>
                    </div>
                    <div class="p-4 overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="text-[10px] font-black uppercase text-gray-400 border-b">
                                    <th class="p-2 text-center">Fecha/Hora</th>
                                    <th class="p-2">Cliente</th>
                                    <th class="p-2 text-center">Cant.</th>
                                    <th class="p-2 text-center">CVV</th>
                                    <th class="p-2 text-right">Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="lista-pedidos" class="text-sm"></tbody>
                        </table>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-blue-600">
                    <h2 class="font-bold mb-4 text-blue-800 uppercase">Mis Productos en Venta</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="inventario-productos"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Si no hay sesión, manda a login.html
        if(sessionStorage.getItem('admin_session') !== 'active') window.location.href = "login.html";

        const supabaseUrl = "https://cmerzffzueraitdfgdnn.supabase.co";
        const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNtZXJ6ZmZ6dWVyYWl0ZGZnZG5uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NzQwNTcsImV4cCI6MjA4OTQ1MDA1N30.nDngLTNgvFudxKCHZCJBx8qNqRJeXZvg_rHAVLVm210";
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let currentTab = 'Pendiente';

        async function inicializar() {
            await cargarPedidos();
            await cargarDatosConfig();
            await cargarInventario();
        }
        inicializar();

        async function cargarPedidos() {
            let query = _supabase.from('pedidos').select('*');
            if(currentTab === 'Pendiente') {
                query = query.eq('estado', 'Pendiente').order('created_at', { ascending: true });
            } else {
                query = query.neq('estado', 'Pendiente').order('created_at', { ascending: false });
            }
            const { data } = await query;
            const lista = document.getElementById('lista-pedidos');
            if(!data || data.length === 0) {
                lista.innerHTML = '<tr><td colspan="5" class="text-center py-8 text-gray-400 italic">No hay registros aquí.</td></tr>';
                return;
            }
            lista.innerHTML = data.map(p => {
                const fecha = new Date(p.created_at).toLocaleString('es-PE');
                const btnColor = p.estado === 'Entregado' ? 'bg-green-100 text-green-700' : p.estado === 'Cancelado' ? 'bg-red-100 text-red-700' : '';
                return `
                <tr class="border-b hover:bg-gray-50">
                    <td class="p-2 text-[9px] text-gray-500 text-center">${fecha}</td>
                    <td class="p-2 font-bold">${p.cliente_nombre}<br><span class="text-blue-600 text-[10px]">${p.cliente_celular}</span></td>
                    <td class="p-2 text-center font-bold">${p.cantidad}</td>
                    <td class="p-2 text-center font-mono font-bold text-red-600">${p.codigo_seguridad}</td>
                    <td class="p-2 text-right space-y-1">
                        ${currentTab === 'Pendiente' ? `
                            <button onclick="cambiarEstadoPedido(${p.id}, 'Entregado')" class="bg-green-600 text-white px-2 py-1 rounded text-[9px] font-bold">ENTREGADO</button>
                            <button onclick="cambiarEstadoPedido(${p.id}, 'Cancelado')" class="bg-red-600 text-white px-2 py-1 rounded text-[9px] font-bold">CANCELAR</button>
                            <a href="https://wa.me/51${p.cliente_celular}" target="_blank" class="block bg-blue-500 text-white px-2 py-1 rounded text-[9px] text-center font-bold">WSP</a>
                        ` : `<span class="${btnColor} px-3 py-1 rounded-full text-[9px] font-bold uppercase">${p.estado}</span>`}
                    </td>
                </tr>`;
            }).join('');
        }

        async function cambiarEstadoPedido(id, nuevoEstado) {
            await _supabase.from('pedidos').update({ estado: nuevoEstado }).eq('id', id);
            cargarPedidos();
        }

        function cambiarTabPedidos(tab) {
            currentTab = tab;
            document.getElementById('tab-pendientes').className = tab === 'Pendiente' ? 'flex-1 py-3 tab-active text-xs' : 'flex-1 py-3 text-gray-500 text-xs';
            document.getElementById('tab-historial').className = tab === 'Finalizado' ? 'flex-1 py-3 tab-active text-xs' : 'flex-1 py-3 text-gray-500 text-xs';
            cargarPedidos();
        }

        async function cargarInventario() {
            const { data } = await _supabase.from('productos').select('*').order('nombre');
            const cont = document.getElementById('inventario-productos');
            cont.innerHTML = data.map(p => `
                <div class="flex items-center gap-3 p-3 border rounded-lg bg-gray-50">
                    <img src="${p.imagen_url || p.video_url}" class="w-12 h-12 object-cover rounded shadow-sm">
                    <div class="flex-1">
                        <p class="font-bold text-sm leading-tight">${p.nombre}</p>
                        <p class="text-xs text-green-700 font-bold">S/ ${p.precio}</p>
                    </div>
                    <div class="flex flex-col gap-1">
                        <button onclick='prepararEdicion(${JSON.stringify(p).replace(/'/g, "&apos;")})' class="text-[9px] bg-blue-100 text-blue-700 px-2 py-1 rounded font-bold uppercase">EDITAR</button>
                        <button onclick="eliminarProducto(${p.id})" class="text-[9px] bg-red-100 text-red-700 px-2 py-1 rounded font-bold uppercase">BORRAR</button>
                    </div>
                </div>
            `).join('');
        }

        function prepararEdicion(p) {
            document.getElementById('edit-id').value = p.id;
            document.getElementById('p-nombre').value = p.nombre;
            document.getElementById('p-precio').value = p.precio;
            document.getElementById('p-desc').value = p.descripcion;
            document.getElementById('form-title').innerText = "Editando Producto";
            document.getElementById('btn-subir').innerText = "GUARDAR CAMBIOS";
            document.getElementById('btn-cancelar').classList.remove('hidden');
            window.scrollTo(0, 0);
        }

        function cancelarEdicion() {
            document.getElementById('edit-id').value = "";
            document.getElementById('p-nombre').value = "";
            document.getElementById('p-precio').value = "";
            document.getElementById('p-desc').value = "";
            document.getElementById('form-title').innerText = "Subir Nuevo Producto";
            document.getElementById('btn-subir').innerText = "PUBLICAR";
            document.getElementById('btn-cancelar').classList.add('hidden');
        }

        async function guardarProducto() {
            const id = document.getElementById('edit-id').value;
            const nombre = document.getElementById('p-nombre').value;
            const precio = document.getElementById('p-precio').value;
            const desc = document.getElementById('p-desc').value;
            const file = document.getElementById('p-archivo').files[0];
            if(!nombre || !precio) return alert("Nombre y precio son obligatorios");
            document.getElementById('loading').classList.remove('hidden');
            let mediaUrl = null, esVideo = false;
            if(file) {
                const name = Date.now() + "_" + file.name;
                await _supabase.storage.from('archivos-chocopepis').upload(name, file);
                const { data } = _supabase.storage.from('archivos-chocopepis').getPublicUrl(name);
                mediaUrl = data.publicUrl;
                esVideo = file.type.startsWith('video/');
            }
            const payload = { nombre, precio, descripcion: desc };
            if(mediaUrl) {
                payload.imagen_url = esVideo ? null : mediaUrl;
                payload.video_url = esVideo ? mediaUrl : null;
            }
            if(id) { await _supabase.from('productos').update(payload).eq('id', id); }
            else { await _supabase.from('productos').insert([payload]); }
            location.reload();
        }

        async function eliminarProducto(id) {
            if(confirm("¿Seguro que quieres borrar este producto?")) {
                await _supabase.from('productos').delete().eq('id', id);
                cargarInventario();
            }
        }

        async function cargarDatosConfig() {
            const { data } = await _supabase.from('configuracion').select('*').eq('id', 1).single();
            if(data) {
                document.getElementById('yape-nombre').value = data.nombre_yape;
                if(data.qr_url) document.getElementById('qr-preview').innerHTML = `<img src="${data.qr_url}" class="h-32 rounded border shadow-sm">`;
            }
        }

        async function actualizarConfiguracion() {
            const file = document.getElementById('qr-archivo').files[0];
            const nombre = document.getElementById('yape-nombre').value;
            let url = null;
            if(file) {
                const name = "qr_" + Date.now();
                await _supabase.storage.from('archivos-chocopepis').upload(name, file);
                const { data } = _supabase.storage.from('archivos-chocopepis').getPublicUrl(name);
                url = data.publicUrl;
            }
            const update = { nombre_yape: nombre };
            if(url) update.qr_url = url;
            await _supabase.from('configuracion').update(update).eq('id', 1);
            alert("Pago actualizado!");
            location.reload();
        }

        function logout() { 
            sessionStorage.clear(); 
            window.location.href = "login.html"; 
        }
    </script>
</body>
</html>
