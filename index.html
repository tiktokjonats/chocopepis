<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHOCOPEPIS - Catálogo Oficial</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #fdf8f5; }
        
        /* FONDO DE CABECERA CON PROFUNDIDAD Y TEXTURA */
        .header-bg { 
            background: linear-gradient(135deg, #5d3828 0%, #2a1610 100%);
            position: relative; 
            overflow: hidden; 
            border-bottom: 6px solid #d97706;
        }
        .header-bg::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url("https://www.transparenttextures.com/patterns/dark-matter.png");
            opacity: 0.5;
            mix-blend-mode: overlay;
        }

        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
        .shine-effect { position: relative; display: inline-block; overflow: hidden; background: linear-gradient(to right, #ffffff 0%, #ffffff 10%, #fde68a 50%, #ffffff 90%, #ffffff 100%); background-size: 200% auto; background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shine 4s linear infinite, float 4s ease-in-out infinite; }
        @keyframes shine { to { background-position: 200% center; } }
        .pulse-text { animation: softPulse 3s infinite; }
        @keyframes softPulse { 0% { opacity: 0.8; transform: scale(1); } 50% { opacity: 1; transform: scale(1.02); } 100% { opacity: 0.8; transform: scale(1); } }
        
        .card-choco { background: white; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); transition: transform 0.3s ease; height: 100%; display: flex; flex-direction: column; }
        .card-choco:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(120, 53, 15, 0.15); }
        .btn-principal { background-color: #7a4a35; transition: all 0.3s; }
        .btn-principal:hover { background-color: #5d3828; }
        .img-completa { width: 100%; height: 250px; object-fit: contain; background-color: #fff; padding: 10px; }
        #modal-p { align-items: center; justify-content: center; overflow-y: auto; }
    </style>
</head>
<body class="pb-10 text-gray-800">

    <header class="header-bg py-10 md:py-14 px-4 shadow-2xl">
        <div class="relative z-10 max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-center gap-6 md:gap-10">
            
            <img src="logo.png" alt="Logo Chocopepis" class="w-40 md:w-56 object-contain drop-shadow-2xl hover:scale-105 transition-transform duration-500">
            
            <div class="text-center md:text-left">
                <h1 class="text-5xl md:text-7xl lg:text-8xl font-black tracking-[0.1em] mb-2 shine-effect uppercase drop-shadow-lg">CHOCOPEPIS</h1>
                <p class="text-orange-200 text-xs md:text-lg italic font-medium uppercase tracking-[0.3em] pulse-text drop-shadow-md">Deliciosas chocotejas artesanales</p>
            </div>

        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-10">
        <div id="catalogo" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 md:gap-8"></div>
    </main>

    <div id="modal-p" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm flex p-4 z-50">
        <div class="bg-white w-full max-w-md rounded-3xl overflow-hidden shadow-2xl my-auto animate-fade-in">
            <div class="p-5 bg-orange-50 border-b border-orange-100 flex justify-between items-center">
                <h2 class="text-xl font-bold text-amber-950 uppercase italic tracking-tighter">Tu Pedido</h2>
                <button onclick="cerrarModal()" class="text-amber-900 font-black text-xl hover:text-red-600 transition">✕</button>
            </div>
            
            <div class="p-6 space-y-4 max-h-[80vh] overflow-y-auto text-sm">
                <input type="text" id="c-nom" placeholder="Escribe tu nombre completo" class="w-full p-3 border rounded-xl outline-none focus:ring-2 ring-amber-700 bg-gray-50">
                <input type="text" id="c-cel" placeholder="Número de WhatsApp" class="w-full p-3 border rounded-xl outline-none focus:ring-2 ring-amber-700 bg-gray-50">

                <div id="div-sabor" class="space-y-1">
                    <label class="text-[10px] font-bold text-amber-800 uppercase ml-1">Elige el relleno:</label>
                    <select id="c-sabor" class="w-full p-3 border rounded-xl outline-none bg-blue-50 font-bold text-blue-900 shadow-sm uppercase">
                    </select>
                </div>

                <div class="bg-amber-50 p-4 rounded-xl border border-amber-100">
                    <p class="text-[10px] font-bold text-amber-800 uppercase mb-2 text-center">Cantidad</p>
                    <div class="flex items-center justify-center gap-5 mb-3">
                        <button onclick="cambiarCantidad(-1)" class="w-8 h-8 rounded-full bg-white border shadow-sm text-amber-900 font-bold hover:bg-amber-100">-</button>
                        <input type="number" id="c-can" value="1" min="1" oninput="actualizarTotal()" class="w-10 text-center bg-transparent text-lg font-bold text-amber-950 outline-none">
                        <button onclick="cambiarCantidad(1)" class="w-8 h-8 rounded-full bg-amber-900 text-white shadow-sm font-bold hover:bg-amber-800">+</button>
                    </div>
                    <div class="flex justify-between items-center pt-2 border-t border-amber-200">
                        <span class="text-amber-800/60 text-xs font-bold uppercase">Total a pagar:</span>
                        <span id="display-total" class="text-xl font-black text-amber-900 leading-none">S/ 0.00</span>
                    </div>
                </div>

                <div class="text-center bg-gray-50 p-5 rounded-xl border-2 border-dashed border-amber-200">
                    <p id="yape-label" class="text-[10px] font-bold text-gray-500 mb-2 uppercase tracking-tighter">Pagar a Silvia Pazos</p>
                    <div class="flex flex-col items-center gap-2">
                        <span id="yape-numero" class="text-2xl font-black text-amber-900 tracking-wider font-mono">900000000</span>
                        <button onclick="copiarNumero()" class="bg-amber-100 text-amber-800 text-[10px] px-4 py-1 rounded-full font-bold hover:bg-amber-200 transition uppercase shadow-sm">Copiar Número</button>
                    </div>
                    <div class="mt-4">
                        <label class="text-[10px] font-bold text-gray-400 uppercase block mb-1 italic">Código de seguridad del Yape</label>
                        <input type="text" id="c-cvv" placeholder="Ingresa los 3 dígitos" maxlength="3" class="w-full text-center p-3 border rounded-xl font-bold text-amber-900 text-lg shadow-inner bg-white focus:ring-2 ring-amber-500 outline-none">
                    </div>
                </div>

                <button onclick="comprar()" class="w-full btn-principal text-white font-bold py-3 rounded-xl shadow-lg uppercase tracking-widest hover:scale-[1.02] transition-transform">Confirmar Pedido</button>
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = "https://cmerzffzueraitdfgdnn.supabase.co";
        const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNtZXJ6ZmZ6dWVyYWl0ZGZnZG5uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NzQwNTcsImV4cCI6MjA4OTQ1MDA1N30.nDngLTNgvFudxKCHZCJBx8qNqRJeXZvg_rHAVLVm210";
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);
        let itemActual = null; let precioActual = 0;

        async function cargarCatalogo() {
            const { data } = await _supabase.from('productos').select('*').order('nombre');
            const cont = document.getElementById('catalogo'); cont.innerHTML = "";
            data.forEach(p => {
                const media = p.video_url ? `<video src="${p.video_url}" class="img-completa" muted loop onmouseover="this.play()" onmouseout="this.pause()"></video>` : `<img src="${p.imagen_url || 'https://via.placeholder.com/400'}" class="img-completa">`;
                const card = document.createElement('div');
                card.className = "card-choco overflow-hidden shadow-sm";
                // Eliminé la clase 'line-clamp-2' de la descripción
                card.innerHTML = `<div class="relative bg-white">${media}<div class="absolute top-2 right-2"><span class="bg-amber-900 text-white px-2 py-1 rounded-lg font-bold text-xs shadow-md uppercase">S/ ${p.precio}</span></div></div><div class="p-4 flex flex-col flex-grow text-center"><h3 class="text-lg font-bold text-amber-950 mb-1 leading-tight uppercase tracking-tight">${p.nombre}</h3><p class="text-gray-500 text-xs mb-4 flex-grow text-justify leading-relaxed">${p.descripcion}</p><button class="btn-pedir mt-auto w-full btn-principal text-white font-bold py-2 rounded-lg shadow-md text-xs tracking-widest uppercase hover:opacity-90 transition">¡LO QUIERO!</button></div>`;
                card.querySelector('.btn-pedir').onclick = () => abrirModal(p);
                cont.appendChild(card);
            });
        }
        cargarCatalogo();

        async function abrirModal(p) {
            itemActual = p.id; precioActual = parseFloat(p.precio);
            document.getElementById('c-can').value = 1; actualizarTotal();
            
            const selSabor = document.getElementById('c-sabor');
            const saboresStr = p.sabores_disponibles || '';
            
            if(saboresStr.trim() !== '') {
                document.getElementById('div-sabor').style.display = 'block';
                const listaSabs = saboresStr.split(',').map(s => s.trim());
                selSabor.innerHTML = listaSabs.map(s => `<option value="${s}">${s.toUpperCase()}</option>`).join('');
            } else {
                document.getElementById('div-sabor').style.display = 'none';
                selSabor.innerHTML = `<option value="-">ÚNICO SABOR</option>`;
            }

            const { data: config } = await _supabase.from('configuracion').select('*').eq('id', 1).single();
            if(config) {
                document.getElementById('yape-numero').innerText = config.yape_celular || '900000000';
                document.getElementById('yape-label').innerText = `Pagar a: ${config.nombre_yape}`;
            }
            document.getElementById('modal-p').classList.remove('hidden');
            document.getElementById('modal-p').style.display = 'flex';
        }

        function copiarNumero() {
            const num = document.getElementById('yape-numero').innerText;
            navigator.clipboard.writeText(num).then(() => alert("📱 Número copiado: " + num));
        }

        function cambiarCantidad(n) { let input = document.getElementById('c-can'); let val = parseInt(input.value) + n; if(val < 1) val = 1; input.value = val; actualizarTotal(); }
        function actualizarTotal() { const can = parseInt(document.getElementById('c-can').value) || 0; const total = (can * precioActual).toFixed(2); document.getElementById('display-total').innerText = `S/ ${total}`; }
        function cerrarModal() { document.getElementById('modal-p').classList.add('hidden'); document.getElementById('modal-p').style.display = 'none'; }

        async function comprar() {
            const nom = document.getElementById('c-nom').value; const cel = document.getElementById('c-cel').value;
            const can = document.getElementById('c-can').value; const cvv = document.getElementById('c-cvv').value;
            const sab = document.getElementById('c-sabor').value;
            if(!nom || !cel || !cvv) return alert("Por favor, completa todos los datos.");
            const { error } = await _supabase.from('pedidos').insert([{ cliente_nombre: nom, cliente_celular: cel, producto_id: itemActual, cantidad: parseInt(can), sabor: sab, codigo_seguridad: cvv, estado: 'Pendiente' }]);
            if(!error) { alert("🎉 ¡Pedido confirmado! Silvia te escribirá pronto por WhatsApp."); cerrarModal(); location.reload(); }
            else { alert("Error al enviar el pedido."); }
        }
    </script>
</body>
</html>
