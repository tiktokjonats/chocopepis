<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHOCOPEPIS - Catálogo Oficial</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Poppins', sans-serif;
            background-color: #fdf8f5;
        }
        .header-bg {
            background-color: #4b2c20;
            background-image: url("https://www.transparenttextures.com/patterns/dark-matter.png");
            position: relative;
            overflow: hidden;
        }

        /* ANIMACIÓN DE FLOTE PARA EL TÍTULO */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        /* EFECTO DE BRILLO QUE CRUZA EL TEXTO */
        .shine-effect {
            position: relative;
            display: inline-block;
            overflow: hidden;
            background: linear-gradient(to right, #ffffff 0%, #ffffff 10%, #fde68a 50%, #ffffff 90%, #ffffff 100%);
            background-size: 200% auto;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite, float 4s ease-in-out infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        /* LATIDO SUAVE PARA EL ESLOGAN */
        .pulse-text {
            animation: softPulse 3s infinite;
        }

        @keyframes softPulse {
            0% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
            100% { opacity: 0.7; transform: scale(1); }
        }

        .card-choco {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
            height: 100%;
        }
        .card-choco:hover {
            transform: translateY(-5px);
        }
        .btn-principal {
            background-color: #7a4a35;
            transition: all 0.3s;
        }
        .btn-principal:hover {
            background-color: #5d3828;
        }
        .img-completa {
            width: 100%;
            height: 250px;
            object-fit: contain;
            background-color: #fff;
            padding: 10px;
        }
        #modal-p {
            align-items: center;
            justify-content: center;
            overflow-y: auto;
        }
    </style>
</head>
<body class="pb-10 text-gray-800">

    <header class="header-bg py-10 md:py-16 px-4 text-center shadow-lg">
        <h1 class="text-5xl md:text-8xl font-black tracking-[0.2em] mb-4 shine-effect">
            CHOCOPEPIS
        </h1>
        <p class="text-orange-200 text-xs md:text-xl italic font-medium uppercase tracking-[0.3em] pulse-text">
            Deliciosas chocotejas artesanales
        </p>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-10">
        <div id="catalogo" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 md:gap-8">
        </div>
    </main>

    <div id="modal-p" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm flex p-4 z-50">
        <div class="bg-white w-full max-w-md rounded-3xl overflow-hidden shadow-2xl my-auto">
            <div class="p-5 bg-orange-50 border-b border-orange-100 flex justify-between items-center">
                <h2 class="text-xl font-bold text-amber-950">Finalizar Pedido</h2>
                <button onclick="cerrarModal()" class="text-amber-900 font-black text-xl">✕</button>
            </div>
            
            <div class="p-6 space-y-4 max-h-[80vh] overflow-y-auto">
                <input type="text" id="c-nom" placeholder="Tu nombre completo" class="w-full p-3 border rounded-xl outline-none focus:ring-2 ring-amber-700 bg-gray-50 text-sm">
                <input type="text" id="c-cel" placeholder="Número de WhatsApp" class="w-full p-3 border rounded-xl outline-none focus:ring-2 ring-amber-700 bg-gray-50 text-sm">

                <div class="bg-amber-50 p-4 rounded-xl border border-amber-100">
                    <p class="text-[10px] font-bold text-amber-800 uppercase mb-2 text-center">Cantidad</p>
                    <div class="flex items-center justify-center gap-4 mb-3">
                        <button onclick="cambiarCantidad(-1)" class="w-8 h-8 rounded-full bg-white border shadow-sm text-amber-900 font-bold hover:bg-amber-100">-</button>
                        <input type="number" id="c-can" value="1" min="1" oninput="actualizarTotal()" class="w-10 text-center bg-transparent text-lg font-bold text-amber-950">
                        <button onclick="cambiarCantidad(1)" class="w-8 h-8 rounded-full bg-amber-900 text-white shadow-sm font-bold hover:bg-amber-800">+</button>
                    </div>
                    <div class="flex justify-between items-center pt-2 border-t border-amber-200">
                        <span class="text-amber-800/60 text-xs font-bold uppercase">Total:</span>
                        <span id="display-total" class="text-xl font-black text-amber-900 leading-none">S/ 0.00</span>
                    </div>
                </div>

                <div class="text-center bg-gray-50 p-4 rounded-xl border">
                    <p id="yape-label" class="text-[10px] font-bold text-gray-500 mb-2 uppercase tracking-tighter">Pagar a Silvia Pazos</p>
                    <img id="qr-img" src="" class="mx-auto rounded-lg border-2 border-white shadow-sm w-32 h-32 object-contain">
                    <input type="text" id="c-cvv" placeholder="CVV (3 dígitos)" maxlength="3" class="mt-3 w-full text-center p-2 border rounded-lg font-bold text-amber-900 text-sm shadow-inner">
                </div>

                <button onclick="comprar()" class="w-full btn-principal text-white font-bold py-3 rounded-xl shadow-lg uppercase text-sm tracking-widest hover:scale-105 transition-transform">Confirmar Pedido</button>
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = "https://cmerzffzueraitdfgdnn.supabase.co";
        const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNtZXJ6ZmZ6dWVyYWl0ZGZnZG5uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NzQwNTcsImV4cCI6MjA4OTQ1MDA1N30.nDngLTNgvFudxKCHZCJBx8qNqRJeXZvg_rHAVLVm210";
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let itemActual = null;
        let precioActual = 0;

        async function cargarCatalogo() {
            const { data } = await _supabase.from('productos').select('*').order('nombre');
            const cont = document.getElementById('catalogo');
            cont.innerHTML = "";

            data.forEach(p => {
                const media = p.video_url 
                    ? `<video src="${p.video_url}" class="img-completa" muted loop onmouseover="this.play()" onmouseout="this.pause()"></video>`
                    : `<img src="${p.imagen_url || 'https://via.placeholder.com/400'}" class="img-completa">`;

                const card = document.createElement('div');
                card.className = "card-choco overflow-hidden flex flex-col";
                card.innerHTML = `
                    <div class="relative bg-white">
                        ${media}
                        <div class="absolute top-2 right-2">
                            <span class="bg-amber-900 text-white px-2 py-1 rounded-lg font-bold text-xs shadow-md">S/ ${p.precio}</span>
                        </div>
                    </div>
                    <div class="p-4 flex flex-col flex-grow text-center">
                        <h3 class="text-lg font-bold text-amber-950 mb-1 leading-tight">${p.nombre}</h3>
                        <p class="text-gray-400 text-xs mb-4 line-clamp-2">${p.descripcion}</p>
                        <button class="btn-pedir mt-auto w-full btn-principal text-white font-bold py-2 rounded-lg shadow-md text-xs tracking-widest uppercase hover:opacity-90">
                            ¡LO QUIERO!
                        </button>
                    </div>
                `;

                card.querySelector('.btn-pedir').onclick = () => abrirModal(p);
                cont.appendChild(card);
            });
        }
        cargarCatalogo();

        async function abrirModal(p) {
            itemActual = p.id;
            precioActual = parseFloat(p.precio);
            document.getElementById('c-can').value = 1;
            actualizarTotal();

            const { data } = await _supabase.from('configuracion').select('*').eq('id', 1).single();
            if(data) {
                document.getElementById('qr-img').src = data.qr_url;
                document.getElementById('yape-label').innerText = `Pagar a: ${data.nombre_yape}`;
            }

            document.getElementById('modal-p').classList.remove('hidden');
            document.getElementById('modal-p').style.display = 'flex';
        }

        function cambiarCantidad(n) {
            const input = document.getElementById('c-can');
            let val = parseInt(input.value) + n;
            if(val < 1) val = 1;
            input.value = val;
            actualizarTotal();
        }

        function actualizarTotal() {
            const can = parseInt(document.getElementById('c-can').value) || 0;
            const total = (can * precioActual).toFixed(2);
            document.getElementById('display-total').innerText = `S/ ${total}`;
        }

        function cerrarModal() {
            document.getElementById('modal-p').classList.add('hidden');
            document.getElementById('modal-p').style.display = 'none';
        }

        async function comprar() {
            const nom = document.getElementById('c-nom').value;
            const cel = document.getElementById('c-cel').value;
            const can = document.getElementById('c-can').value;
            const cvv = document.getElementById('c-cvv').value;

            if(!nom || !cel || !cvv) return alert("Por favor, completa todos los datos.");

            const { error } = await _supabase.from('pedidos').insert([{
                cliente_nombre: nom,
                cliente_celular: cel,
                producto_id: itemActual,
                cantidad: parseInt(can),
                codigo_seguridad: cvv,
                estado: 'Pendiente'
            }]);

            if(!error) {
                alert("🎉 ¡Pedido confirmado! Silvia te escribirá pronto por WhatsApp.");
                cerrarModal();
                location.reload();
            } else {
                alert("Error al enviar el pedido.");
            }
        }
    </script>
</body>
</html>
