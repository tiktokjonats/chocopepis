<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHOCOPEPIS - Acceso</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-amber-50 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm border-t-8 border-amber-900">
        <h1 class="text-3xl font-black mb-6 text-center text-amber-900">CHOCOPEPIS</h1>
        <div class="space-y-4">
            <input type="text" id="user" placeholder="Usuario" class="border-2 p-3 w-full rounded-xl outline-none focus:border-amber-700">
            <input type="password" id="pass" placeholder="Contraseña" class="border-2 p-3 w-full rounded-xl outline-none focus:border-amber-700">
            <button onclick="login()" class="bg-amber-900 text-white font-bold py-3 w-full rounded-xl hover:bg-amber-800 transition">Entrar como Admin</button>
            <div class="text-center py-2 text-gray-400">ó</div>
            <a href="cliente.html" class="block text-center bg-orange-100 text-amber-900 font-bold py-3 w-full rounded-xl hover:bg-orange-200">Ver Catálogo</a>
        </div>
    </div>

    <script>
        const supabaseUrl = "https://cmerzffzueraitdfgdnn.supabase.co";
        const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNtZXJ6ZmZ6dWVyYWl0ZGZnZG5uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NzQwNTcsImV4cCI6MjA4OTQ1MDA1N30.nDngLTNgvFudxKCHZCJBx8qNqRJeXZvg_rHAVLVm210";
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function login() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;

            const { data, error } = await _supabase
                .from('usuarios')
                .select('*')
                .eq('usuario', u)
                .eq('contrasena', p)
                .single();

            if (data) {
                sessionStorage.setItem('admin_session', 'active');
                window.location.href = "admin.html";
            } else {
                alert("Usuario o contraseña incorrectos");
            }
        }
    </script>
</body>
</html>
